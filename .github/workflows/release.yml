name: Release (build + verify + publish)

on:
  push:
    branches:
      - main
      - staging
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Quality gates (lint, type-check, tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install package + all dev dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check src/xtrace_sdk/ --output-format=github

      - name: Mypy
        run: uv run mypy src/xtrace_sdk/

      - name: Pytest (lookup encryption)
        run: uv run pytest tests/x_vec/test_paillier_lookup_encryption.py

      - name: Pytest (paillier encryption)
        run: uv run pytest tests/x_vec/test_paillier_encryption.py

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: qa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build artifacts
        run: uv build
        env:
          SETUPTOOLS_SCM_LOCAL_SCHEME: ${{ github.ref == 'refs/heads/staging' && 'no-local-version' || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist

  verify:
    name: Verify wheel is installable
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install from wheel and import
        run: |
          uv pip install --system dist/*.whl
          python -c "import xtrace_sdk; print('Imported:', xtrace_sdk.__name__)"

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/staging'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist

      - name: Publish (TestPyPI via OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          packages-dir: dist
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist

      - name: Publish (PyPI via OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          packages-dir: dist
          skip-existing: true
